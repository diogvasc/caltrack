{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}caltrack{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3248;
            --accent: #6ee7b7;
            --accent2: #818cf8;
            --text: #e2e8f0;
            --muted: #64748b;
            --danger: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-logo span { color: var(--muted); }

        .nav-links {
            display: flex;
            gap: 0.25rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.85rem;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            background: var(--surface2);
        }

        /* MAIN */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .page-header p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 0.35rem;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead th {
            text-align: left;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        tbody td {
            padding: 0.85rem 1rem;
            color: var(--text);
        }

        /* BADGE */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--surface2);
            color: var(--accent2);
            border: 1px solid var(--border);
        }

        /* PILL (meal type) */
        .pill {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(110, 231, 183, 0.1);
            color: var(--accent);
            border: 1px solid rgba(110, 231, 183, 0.2);
        }

        /* STAT CARD */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            transition: border-color 0.15s, transform 0.15s;
            display: block;
        }

        .stat-card:hover {
            border-color: var(--accent2);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
        }

        .stat-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.35rem;
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* MONO TEXT */
        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'index' %}" class="nav-logo">cal<span>track</span></a>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Dashboard</a></li>
            <li><a href="{% url 'categorias' %}">Categorias</a></li>
            <li><a href="{% url 'alimentos' %}">Alimentos</a></li>
            <li><a href="{% url 'registos' %}">Registos</a></li>
            <li><a href="{% url 'refeicoes' %}">Refeições</a></li>
            <li><a href="{% url 'objetivos' %}">Objetivos</a></li>
            <li><a href="/admin/">Admin</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
