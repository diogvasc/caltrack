{% extends 'workshop/base.html' %}
{% block title %}Apagar — caltrack{% endblock %}

{% block content %}
<div class="page-head">
    <div>
        <h1 class="page-title">Confirmar remoção</h1>
    </div>
</div>

<div class="card form-card" style="border-color:rgba(255,107,107,.25);">
    <p style="font-size:14.5px; line-height:1.6;">
        Tens a certeza que queres apagar <strong style="color:var(--lime)">{{ object }}</strong>?
    </p>
    <p style="font-size:12.5px; color:var(--danger); margin-top:8px;">Esta ação não pode ser desfeita.</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-row-actions">
            <a href="{{ voltar_url }}" class="btn">Cancelar</a>
            <button type="submit" class="btn" style="background:var(--danger); color:#fff; border-color:var(--danger); font-weight:600;">Sim, apagar</button>
        </div>
    </form>
</div>
{% endblock %}
