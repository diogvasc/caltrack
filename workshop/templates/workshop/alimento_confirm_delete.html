{% extends 'workshop/base.html' %}

{% block title %}Apagar Alimento — CalorieTracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Apagar alimento</h1>
</div>

<div class="confirm-card">
    <p>Tens a certeza que queres apagar <strong>{{ object.nome }}</strong>?</p>
    <p class="warn">Esta ação não pode ser desfeita.</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <a href="{% url 'alimentos' %}" class="btn-cancel">Cancelar</a>
            <button type="submit" class="btn-delete">Sim, apagar</button>
        </div>
    </form>
</div>

<style>
.confirm-card {
    background: var(--surface);
    border: 1px solid rgba(224,68,68,0.25);
    border-radius: 12px;
    padding: 2rem;
    max-width: 460px;
}

.confirm-card p {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
}

.confirm-card strong {
    color: var(--accent);
}

.warn {
    color: #e04444;
    font-size: 0.82rem !important;
    margin-bottom: 1.5rem !important;
}

.form-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
}

.btn-delete {
    padding: 0.55rem 1.25rem;
    background: #e04444;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
}
.btn-delete:hover { opacity: 0.85; }

.btn-cancel {
    padding: 0.55rem 1.25rem;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.875rem;
    text-decoration: none;
    transition: color 0.15s;
}
.btn-cancel:hover { color: var(--text); }
</style>
{% endblock %}
